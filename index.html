// ─── UTILS ───────────────────────────────────────────────────────────────────

function generateCode(studentName, langCode, unitId, score) {
  let hash = 0;
  const str = `${studentName.toLowerCase().trim()}-${langCode}-unit${unitId}-${score}`;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
  }
  const abs = Math.abs(hash).toString(36).toUpperCase().padStart(6, "0");
  return `RBX-${abs.slice(0, 3)}-${abs.slice(3, 6)}`;
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// ─── SHARED UI ───────────────────────────────────────────────────────────────

function PixelBorder({ children, color = "#f97316", style = {} }) {
  return (
    <div style={{
      background: "#1a1a2e",
      border: `3px solid ${color}`,
      boxShadow: `4px 4px 0 ${color}40, inset 0 0 20px ${color}08`,
      borderRadius: "2px",
      ...style,
    }}>
      {children}
    </div>
  );
}

function ProgressBar({ current, total, color }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div style={{ width: "100%", background: "#0d0d1a", height: "14px", border: "2px solid #222", borderRadius: "2px", overflow: "hidden" }}>
      <div style={{
        width: `${pct}%`, height: "100%",
        background: `linear-gradient(90deg, ${color}, ${color}bb)`,
        transition: "width 0.4s ease",
        boxShadow: `0 0 8px ${color}`,
      }} />
    </div>
  );
}

  const handleSubmit = () => {

      return;
    }

    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "24px" }}>

        animation: shake ? "shake 0.4s ease" : "none",
      }}>
        <label style={labelStyle}>YOUR NAME</label>
        <input value={name} onChange={e => setName(e.target.value)}
          placeholder="e.g. Maria" style={inputStyle}

function QuizScreen({ unit, lang, student, onComplete, onBack }) {
  const langData = LANGUAGES[lang];

  const questions = unit.vocab.map((v) => {
    const wrongPool = unit.vocab.filter(x => x.word !== v.word);
    const wrongs = shuffle(wrongPool).slice(0, 3).map(w => w.english);
    const choices = shuffle([v.english, ...wrongs]);
    return { prompt: v.word, transliteration: v.transliteration, emoji: v.emoji, answer: v.english, choices };
  });

  const [q, setQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [correct, setCorrect] = useState(null);

  const current = questions[q];

  const handleChoice = (choice) => {
    if (selected) return;
    const isCorrect = choice === current.answer;
    setSelected(choice);
    setCorrect(isCorrect);
    if (isCorrect) setScore(s => s + 1);
    setTimeout(() => {
      if (q + 1 < questions.length) {
        setQ(q + 1); setSelected(null); setCorrect(null);
      } else {
        setDone(true);
      }
    }, 900);
  };

  const passed = score >= Math.ceil(unit.vocab.length * 0.8);
  const unlockCode = generateCode(student.name, lang, unit.id, score);

  if (done) {
    return (
      <div style={{ maxWidth: "480px", margin: "0 auto", padding: "24px", textAlign: "center" }}>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: "8px", color: "#333", letterSpacing: "3px", marginBottom: "24px" }}>
          QUIZ COMPLETE
        </div>
        <div style={{ fontSize: "56px", marginBottom: "16px" }}>{passed ? "🏆" : "📚"}</div>

        <PixelBorder color={passed ? "#10b981" : "#f97316"} style={{ padding: "28px", marginBottom: "24px" }}>
          <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: "13px", color: passed ? "#10b981" : "#f97316", marginBottom: "16px" }}>
            {passed ? "LEVEL UP!" : "KEEP STUDYING"}
          </div>
          <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "18px", color: "#fff", marginBottom: "6px" }}>
            Score: {score} / {unit.vocab.length}
          </div>
          <div style={{ color: "#444", fontFamily: "monospace", fontSize: "12px" }}>
            {Math.round((score / unit.vocab.length) * 100)}% — need 80% to pass
          </div>

          {passed && (
            <div style={{ marginTop: "24px", paddingTop: "20px", borderTop: "2px solid #10b98122" }}>
              <div style={{ fontFamily: "monospace", fontSize: "10px", color: "#444", letterSpacing: "2px", marginBottom: "12px" }}>
                YOUR ROBLOX UNLOCK CODE
              </div>
              <div style={{
                fontFamily: "'Press Start 2P', monospace", fontSize: "20px",
                color: "#10b981", background: "#0a0a18", padding: "16px",
                letterSpacing: "4px", border: "2px dashed #10b98144", userSelect: "all",
              }}>
                {unlockCode}
              </div>
              <div style={{ color: "#444", fontFamily: "monospace", fontSize: "11px", marginTop: "10px" }}>
                Enter this in Roblox to unlock the next zone
              </div>
            </div>
          )}
        </PixelBorder>

        <div style={{ display: "flex", gap: "12px" }}>
          {!passed && <button onClick={onBack} style={{ ...ghostBtn, flex: 1 }}>← STUDY AGAIN</button>}
          <button onClick={() => onComplete(unit.id, score, passed)}
            style={{ ...primaryBtn(passed ? "#10b981" : "#f97316"), flex: 2 }}>
            BACK TO MAP ▶
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: "560px", margin: "0 auto", padding: "24px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: "8px", color: unit.color, letterSpacing: "2px" }}>
          QUIZ — UNIT {unit.id}
        </div>
        <div style={{ fontFamily: "monospace", color: "#333", fontSize: "12px" }}>
          {q + 1} / {questions.length}
        </div>
      </div>

      <ProgressBar current={q} total={questions.length} color={unit.color} />

      <PixelBorder color={unit.color} style={{ padding: "36px 28px", textAlign: "center", margin: "20px 0" }}>
        <div style={{ fontSize: "36px", marginBottom: "16px" }}>{current.emoji}</div>
        <div style={{ color: "#333", fontFamily: "monospace", fontSize: "10px", letterSpacing: "2px", marginBottom: "14px" }}>
          WHAT DOES THIS MEAN?
        </div>
        <div style={{
          fontFamily: langData.rtl ? "'Noto Naskh Arabic', serif" : "'Press Start 2P', monospace",
          fontSize: langData.rtl ? "38px" : "20px",
          color: unit.color,
          direction: langData.rtl ? "rtl" : "ltr",
          lineHeight: 1.5,
        }}>
          {current.prompt}
        </div>
        {current.transliteration && (
          <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "14px", color: "#555", fontStyle: "italic", marginTop: "10px" }}>
            {current.transliteration}
          </div>
        )}
      </PixelBorder>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
        {current.choices.map((choice) => {
          let borderColor = "#1e1e30";
          let bg = "#0d0d1a";
          let textColor = "#888";
          if (selected) {
            if (choice === current.answer) { borderColor = "#10b981"; bg = "#10b98110"; textColor = "#10b981"; }
            else if (choice === selected && !correct) { borderColor = "#ef4444"; bg = "#ef444410"; textColor = "#ef4444"; }
          }
          return (
            <button key={choice} onClick={() => handleChoice(choice)} style={{
              background: bg, border: `2px solid ${borderColor}`, borderRadius: "2px",
              padding: "14px", color: textColor, fontFamily: "'Courier Prime', monospace",
              fontSize: "15px", cursor: selected ? "default" : "pointer",
              transition: "all 0.15s ease", textAlign: "center",
            }}>
              {choice}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState("login");
  const [student, setStudent] = useState(null);
  const [lang, setLang] = useState(null);
  const [activeUnit, setActiveUnit] = useState(null);

  // Progress tracked per language: { es: [1, 2], ar: [1] }
  const [progress, setProgress] = useState({ es: [], ar: [] });

  const handleLogin = (name, cls) => {
    setStudent({ name, cls });
    setScreen("langSelect");
  };

  const handleLangSelect = (langCode) => {
    setLang(langCode);
    setScreen("map");
  };

  const handleSelectUnit = (unit) => {
    setActiveUnit(unit);
    setScreen("study");
  };

  const handleComplete = (unitId, score, passed) => {
    if (passed) {
      setProgress(prev => ({
        ...prev,
        [lang]: prev[lang].includes(unitId) ? prev[lang] : [...prev[lang], unitId],
      }));
    }
    setScreen("map");
    setActiveUnit(null);
  };

  const completedUnits = lang ? progress[lang] : [];

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime:ital@0;1&family=Noto+Naskh+Arabic:wght@400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d1a; color: #ccc; min-height: 100vh; }
        input { outline: none; width: 100%; }
        button { cursor: pointer; border: none; outline: none; }
        @keyframes shake {
          0%,100% { transform: translateX(0); }
          20%,60%  { transform: translateX(-8px); }
          40%,80%  { transform: translateX(8px); }
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .screen { animation: fadeIn 0.25s ease; }
      `}</style>

      <div className="screen">
        {screen === "login"      && <LoginScreen onLogin={handleLogin} />}
        {screen === "langSelect" && <LanguageSelectScreen student={student} onSelect={handleLangSelect} />}
        {screen === "map"        && (
          <MapScreen
            student={student} lang={lang}
            completedUnits={completedUnits}
            onSelectUnit={handleSelectUnit}
            onChangeLanguage={() => setScreen("langSelect")}
          />
        )}
        {screen === "study" && activeUnit && (
          <StudyScreen unit={activeUnit} lang={lang}
            onStartQuiz={() => setScreen("quiz")} onBack={() => setScreen("map")} />
        )}
        {screen === "quiz" && activeUnit && (
          <QuizScreen unit={activeUnit} lang={lang} student={student}
            onComplete={handleComplete} onBack={() => setScreen("study")} />
        )}
      </div>
    </>
  );
}

// ─── STYLES ───────────────────────────────────────────────────────────────────

const labelStyle = {
  display: "block", fontFamily: "monospace", fontSize: "10px",
  letterSpacing: "2px", color: "#333", marginBottom: "8px", marginTop: "16px",
};

const inputStyle = {
  background: "#0a0a18", border: "2px solid #1e1e30", borderRadius: "2px",
  padding: "12px 14px", color: "#fff",
  fontFamily: "'Courier Prime', monospace", fontSize: "15px", width: "100%",
};

const primaryBtn = (color) => ({
  background: color, color: "#000",
  fontFamily: "'Press Start 2P', monospace", fontSize: "10px",
  padding: "14px 20px", borderRadius: "2px", width: "100%", marginTop: "20px",
  letterSpacing: "1px", boxShadow: `3px 3px 0 ${color}55`,
});

const ghostBtn = {
  background: "transparent", color: "#333",
  fontFamily: "monospace", fontSize: "12px",
  padding: "10px 16px", border: "1px solid #1e1e30",
  borderRadius: "2px", letterSpacing: "1px", cursor: "pointer",
};


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
